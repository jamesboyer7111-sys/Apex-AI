<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex AI | Voice Automation</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            padding: 0; 
            background-color: #0f172a; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
        }
        .card { 
            background: #1e293b; 
            padding: 3rem; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
            max-width: 400px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: #38bdf8; }
        p { color: #94a3b8; margin-bottom: 2rem; }
        .phone-box { 
            background: #334155; 
            padding: 1.5rem; 
            border-radius: 12px; 
            font-size: 1.5rem; 
            font-weight: bold; 
            color: #f1f5f9;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Apex AI</h1>
        <p>Professional Voice Receptionists</p>
        <div class="phone-box">(813) 738-9660</div>
        <p style="margin-top: 2rem; font-size: 0.9rem;">24/7 Lead Capture & Qualification</p>
    </div>
</body>
</html>
